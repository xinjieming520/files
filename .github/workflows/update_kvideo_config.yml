name: Auto Update Video Configs

on:
  push:
    paths:
      - 'source/LunaTV-config.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-video-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_video_configs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SOURCE_FILE: source/LunaTV-config.json
      VIDEO_FILE: video/config_moontv.json
      KVIDEO_FILE: video/config_kvideo.json
      BASE58_FILE: video/config_moontv_base58.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate source file exists
        run: |
          if [ ! -f "$SOURCE_FILE" ]; then
            echo "Error: source file not found: $SOURCE_FILE"
            exit 1
          fi

      - name: Ensure output directory exists
        run: mkdir -p video

      - name: Copy source config to video config
        run: cp "$SOURCE_FILE" "$VIDEO_FILE"

      - name: Transform Config
        run: python scripts/transform_kvideo_config.py

      - name: Validate transformed JSON
        run: python -m json.tool "$KVIDEO_FILE" > /dev/null

      - name: Encode file to Base58
        run: python scripts/encode_moontv_base58.py

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add "$VIDEO_FILE" "$KVIDEO_FILE" "$BASE58_FILE"

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "Auto-update generated video configs [skip ci]"
            git push
          fi

      - name: Report non-main branch behavior
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Generated outputs updated in workspace, but auto-push is disabled on non-main branches."
