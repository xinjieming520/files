name: Auto Update Video Configs

on:
  push:
    paths:
      - 'source/LunaTV-config.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-video-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_video_configs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install base58==2.1.1

      - name: Copy source config to video config
        run: cp source/LunaTV-config.json video/config_moontv.json

      - name: Transform Config
        run: python scripts/transform_kvideo_config.py

      - name: Encode file to Base58
        run: python scripts/encode_moontv_base58.py

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add video/config_moontv.json video/config_kvideo.json video/config_moontv_base58.json

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "Auto-update generated video configs [skip ci]"
            git push
          fi
